<!-- Top navbar — desktop -->
<nav class="top-navbar">
  <div class="navbar-brand">
    <span class="logo-icon">◈</span>
    <span class="logo-text">PortfolioTracker</span>
  </div>
  <div class="navbar-links">
    <button class="nav-link" [class.active]="isActive('/dashboard')" (click)="navigateTo('/dashboard')">Dashboard</button>
    <button class="nav-link" [class.active]="isActive('/portfolio')" (click)="navigateTo('/portfolio')">Portfolio</button>
    <button class="nav-link" [class.active]="isActive('/watchlist')" (click)="navigateTo('/watchlist')">Watchlist</button>
  </div>
  <div class="navbar-user">
    @if (currentUser$ | async; as user) {
      <span class="user-email">{{ user.email }}</span>
    }
    <button class="btn-profile" (click)="navigateTo('/profile')">Perfil</button>
    <button class="btn-logout" (click)="logout()">Salir</button>
  </div>
</nav>

<!-- Bottom nav — móvil -->
<nav class="bottom-navbar">
  <button class="bottom-nav-item" [class.active]="isActive('/dashboard')" (click)="navigateTo('/dashboard')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <span>Dashboard</span>
  </button>
  <button class="bottom-nav-item" [class.active]="isActive('/portfolio')" (click)="navigateTo('/portfolio')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
    </svg>
    <span>Portfolio</span>
  </button>
  <button class="bottom-nav-item" [class.active]="isActive('/watchlist')" (click)="navigateTo('/watchlist')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
    </svg>
    <span>Watchlist</span>
  </button>
  <button class="bottom-nav-item" [class.active]="isActive('/profile')" (click)="navigateTo('/profile')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Perfil</span>
  </button>
  <button class="bottom-nav-item" (click)="logout()">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    <span>Salir</span>
  </button>
</nav>
